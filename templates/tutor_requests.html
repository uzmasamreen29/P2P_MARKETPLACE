<!DOCTYPE html>
<html>
<head>
    <title>Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h3>Incoming Requests</h3>

    {% if requests %}

        {% for r in requests %}
        <div class="card p-3 mt-2">

            <h5>{{ r.subject }}</h5>
            <p>Student: {{ r.student_name }}</p>
            <p>{{ r.date }} | {{ r.start }}</p>

            <form action="/accept_request" method="POST">
                <input type="hidden" name="request_id" value="{{ r.request_id }}">
                <button class="btn btn-success btn-sm">Accept</button>
            </form>

            <form action="/reject_request" method="POST">
                <input type="hidden" name="request_id" value="{{ r.request_id }}">
                <button class="btn btn-danger btn-sm mt-1">Reject</button>
            </form>

        </div>
        {% endfor %}

    {% else %}
        <div class="alert alert-warning">No requests yet</div>
    {% endif %}

</div>

</body>
</html>
