<!DOCTYPE html>
<html>
<head>
    <title>Search Tutors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>Available Tutors</h2>

    {% for t in tutors %}

    <div class="card p-3 mb-2">

        <h5>{{ t.name }}</h5>
        <p><b>Subject:</b> {{ t.subject }}</p>
        <p><b>Date:</b> {{ t.date }}</p>
        <p><b>Time:</b> {{ t.start }} - {{ t.end }}</p>

        <!-- ⭐ ADD THIS -->
        <p>
            ⭐ {{ t.rating | round(1) }} 
            ({{ t.reviews }} reviews)
        </p>

        <form action="/request_slot" method="POST">
            <input type="hidden" name="slot_id" value="{{ t.slot_id }}">
            <button class="btn btn-primary btn-sm">Request Slot</button>
        </form>

    </div>

    {% endfor %}

</div>

</body>
</html>
