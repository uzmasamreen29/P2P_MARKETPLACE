<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card shadow-lg p-4" style="width: 400px;">

    <h3 class="text-center mb-2">TutorLink</h3>
    <p class="text-center text-muted">Create your account</p>

    <!-- FLASH -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-info text-center">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/signup">

        <!-- ROLE -->
        <div class="mb-3 text-center">
            <label class="form-label">I am a</label><br>
            <input type="radio" name="role" value="student" checked> 🎓 Student
            &nbsp;&nbsp;
            <input type="radio" name="role" value="tutor"> 📚 Tutor
        </div>

        <!-- NAME -->
        <div class="mb-3">
            <input type="text" name="name" class="form-control" placeholder="Full Name" required>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required minlength="6">
        </div>

        <!-- BIO -->
        <div class="mb-3">
            <textarea name="bio" class="form-control" placeholder="Bio (only for tutor)"></textarea>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn btn-primary w-100">
            Create Account
        </button>

    </form>

    <p class="text-center mt-3">
        Already have an account?
        <a href="/login">Login</a>
    </p>

</div>

</body>
</html>
